<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#4583c4"/>
  <!-- QR code grid pattern -->
  <g fill="white">
    <!-- Top-left finder -->
    <rect x="28" y="28" width="56" height="56" rx="6"/>
    <rect x="36" y="36" width="40" height="40" rx="4" fill="#4583c4"/>
    <rect x="44" y="44" width="24" height="24" rx="2"/>
    <!-- Top-right finder -->
    <rect x="108" y="28" width="56" height="56" rx="6"/>
    <rect x="116" y="36" width="40" height="40" rx="4" fill="#4583c4"/>
    <rect x="124" y="44" width="24" height="24" rx="2"/>
    <!-- Bottom-left finder -->
    <rect x="28" y="108" width="56" height="56" rx="6"/>
    <rect x="36" y="116" width="40" height="40" rx="4" fill="#4583c4"/>
    <rect x="44" y="124" width="24" height="24" rx="2"/>
    <!-- Data dots -->
    <rect x="100" y="100" width="12" height="12" rx="2"/>
    <rect x="116" y="100" width="12" height="12" rx="2"/>
    <rect x="132" y="100" width="12" height="12" rx="2"/>
    <rect x="148" y="100" width="12" height="12" rx="2"/>
    <rect x="100" y="116" width="12" height="12" rx="2"/>
    <rect x="132" y="116" width="12" height="12" rx="2"/>
    <rect x="100" y="132" width="12" height="12" rx="2"/>
    <rect x="116" y="132" width="12" height="12" rx="2"/>
    <rect x="148" y="132" width="12" height="12" rx="2"/>
    <rect x="100" y="148" width="12" height="12" rx="2"/>
    <rect x="132" y="148" width="12" height="12" rx="2"/>
    <rect x="148" y="148" width="12" height="12" rx="2"/>
  </g>
</svg>
