name: Version

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Get Latest Tag
        id: get-latest-tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.1")
          echo "Latest tag: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Calculate Next Version
        id: calculate-version
        run: |
          LATEST_TAG="${{ steps.get-latest-tag.outputs.latest_tag }}"

          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          IFS='.' read -ra VERSION_PARTS <<< "$LATEST_TAG"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          echo "Current version parts - Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"

          # Always increment patch version
          NEW_PATCH=$((PATCH + 1))
          if [ $NEW_PATCH -gt 99 ]; then
            NEW_PATCH=0
            NEW_MINOR=$((MINOR + 1))
            if [ $NEW_MINOR -gt 99 ]; then
              NEW_MINOR=0
              NEW_MAJOR=$((MAJOR + 1))
            else
              NEW_MAJOR=$MAJOR
            fi
          else
            NEW_MINOR=$MINOR
            NEW_MAJOR=$MAJOR
          fi

          NEW_VERSION="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          NEW_VERSION="${{ steps.calculate-version.outputs.new_version }}"

          echo "Creating tag: $NEW_VERSION"

          # Create the tag
          git tag -a "$NEW_VERSION" -m "Release version $NEW_VERSION"

          # Push the tag
          git push origin "$NEW_VERSION"

          echo "Tag $NEW_VERSION created and pushed successfully"
